# Compose Spec — no top-level `version` field (deprecated in Docker Compose v2.x).

# Pinned so `docker compose` / `make up` always resolves to this one project regardless of which
# directory (worktree) it's invoked from — otherwise Compose defaults the project name to the current
# directory basename, and a from-worktree `make up` silently mints a new project (new network/volumes)
# that then fails to start (container_name below is fixed), leaking Docker resources on every collision.
name: lattice

services:
  nats:
    image: nats:2.14-alpine
    container_name: lattice-nats
    # -c mounts the transport-authorization permission matrix (NATS account-level
    # write restriction, Path A — deploy/nats-server.conf, generated by
    # deploy/gen-dev-nkeys): only the processor may write core-kv, only refractor
    # may write capability-kv / lens targets. Every Lattice binary authenticates
    # with its own dev NKey seed (deploy/nkeys/<component>.nk) via NATS_NKEY.
    command: ["-c", "/etc/nats/nats-server.conf", "-m", "8222"]
    volumes:
      - ./deploy/nats-server.conf:/etc/nats/nats-server.conf:ro
    ports:
      - "${NATS_PORT:-4222}:4222"   # client
      - "${NATS_WS_PORT:-9222}:9222" # websocket (browser Edge node; dev no_tls)
      - "${NATS_HTTP_PORT:-8222}:8222" # monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    # Ephemeral (no named volume): data is lost on `make down`, which is intentional for dev.
    # Warm restart speed: < 2s because JetStream re-creates buckets from bootstrap.
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: lattice-postgres
    environment:
      POSTGRES_DB: lattice
      POSTGRES_USER: lattice
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-lattice_dev}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lattice -d lattice"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    # Ephemeral: no named volume in dev. Lens target tables are provisioned
    # out-of-band (the Refractor adapter is thin and issues no table DDL).
    restart: "no"
