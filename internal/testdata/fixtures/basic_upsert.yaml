description: "Basic upsert: single anchor node projects to NATS KV target"

rule:
  id: basic-upsert
  team: test-team
  match: "MATCH (a:agreement) RETURN a.id AS agreement_id, a.partyName AS party_name"
  into:
    target: nats_kv
    bucket: target-bucket
    key: agreement_id

inputs:
  - key: "node_agreement_abc123"
    payload:
      id: "abc"
      partyName: "Acme"
      isDeleted: false

expect:
  nats_kv:
    - key: "abc"
      value:
        agreement_id: "abc"
        party_name: "Acme"
