name: CI

on:
  push:
    branches: [main]
    paths-ignore: &doc-paths
      - '**/*.md'
      - 'docs/**'
      - '_bmad/**'
      - '_bmad-output/**'
      - 'agents/**'
      - 'LICENSE'
  pull_request:
    paths-ignore: *doc-paths

# Six independent jobs run concurrently; wall-clock is the slowest job, not
# the sum. Every gate that ran in the old single serial job still runs, each in
# exactly one job:
#   lint-build         — build, vet, golangci, conventions-lint     (no Docker)
#   stack-gates        — make up → verify-kernel → 10× verify-package →
#                         hello-lattice → health-completeness        (Docker)
#   convergence        — lease-convergence, object-gc, augur-convergence,
#                         unrouted-convergence, crypto-shred,
#                         system-actor-capability, control-plane-authz
#                                                                     (no Docker, embedded NATS)
#   unit-1, unit-2      — go test ./... -p 4, split into two weight-balanced
#                         package-glob shards (unit was the long pole — one
#                         `go test ./...` took ~2x any other job; the shards
#                         are sized off per-package test-file LOC so wall-clock
#                         roughly halves)                           (each a Postgres
#                                                                     service container;
#                                                                     otherwise no Docker,
#                                                                     embedded NATS)
#   unit-shard-coverage — asserts unit-1's + unit-2's package globs union to
#                         EXACTLY `go list ./...`, so a newly added package
#                         that isn't sorted into either shard fails CI loudly
#                         instead of silently skipping                (no Docker)
jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: make build

      - name: Build Edge engine for the browser target
        # The Edge engine's semantics are single-sourced in Go and compiled to
        # wasm for the browser node (edge-browser-node-design.md §3.2). The
        # store's browser half is now executed too (see the conformance job);
        # this check still earns its place by covering the packages that job
        # does not run, so an import that cannot build for a browser — bbolt
        # above all — can never re-enter the engine unnoticed.
        run: GOOS=js GOARCH=wasm go build ./internal/edge/...

      - name: Assert the browser Edge engine cannot reach a NATS client
        # The browser node's only sanctioned write door is the Gateway (Fetch)
        # and its only read door is the JS shell's WebSocket; a linked nats.go
        # is both dead weight in the artifact and a trusted transport waiting to
        # be wired around that boundary. The build check above cannot see this —
        # nats.go compiles for js/wasm quite happily — so the confinement is
        # asserted here, at the dependency level, over the same package set.
        #
        # This is the assertion the wire-type extraction bought: the DTOs the
        # engine needs live in leaf packages (opwire / controlwire / healthwire /
        # vaultwire / substrate keys), so reaching a NATS client now takes a
        # deliberate import rather than a struct reference.
        run: |
          deps=$(GOOS=js GOARCH=wasm go list -deps ./internal/edge/...)
          if echo "$deps" | grep -q '^github.com/nats-io/'; then
            echo "::error::the js/wasm Edge engine reaches a NATS client:"
            echo "$deps" | grep '^github.com/nats-io/'
            echo "The browser engine talks to the Gateway, not to NATS directly."
            echo "See edge-browser-node-design.md §3.2/§3.3."
            exit 1
          fi
          echo "OK: no github.com/nats-io/* in the js/wasm engine dependency graph."

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Conventions lint (CLAUDE.md key-shapes + no history comments)
        # Static check: rejects `asp.` key prefixes (Contract #1) and
        # history/changelog comments. STRICT=1 fails the build on any finding.
        run: STRICT=1 go run ./scripts/lint-conventions.go

      - name: Board lint (the backlog is an index, not a journal)
        # Backstop on code commits (board-only commits hit board-lint.yml,
        # which the main paths-ignore skips): fails on an over-budget row, a
        # Survey-log/PO-notes fire-journal, or a multi-line Done-log entry.
        run: STRICT=1 go run ./scripts/lint-board.go

  stack-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Bring up Docker stack + run primordial bootstrap
        run: make up

      - name: Verify kernel (~33 assertions, post-Story-4.7)
        run: make verify-kernel

      - name: Install + verify rbac-domain package
        run: make verify-package-rbac

      - name: Install + verify identity-domain package
        run: make verify-package-identity

      - name: Install + verify identity-hygiene package
        run: make verify-package-identity-hygiene

      - name: Install + verify objects-base package
        run: make verify-package-objects-base

      - name: Install + verify clinic-domain package
        run: make verify-package-clinic-domain

      - name: Install + verify clinic-reminders package (co-installs orchestration-base + clinic-domain)
        run: make verify-package-clinic-reminders

      - name: Install + verify location-domain package
        run: make verify-package-location-domain

      - name: Install + verify loftspace-domain package (co-installs location-domain)
        run: make verify-package-loftspace-domain

      - name: Install + verify service-location package (co-installs location-domain)
        run: make verify-package-service-location

      - name: Install + verify augur package (co-installs orchestration-base)
        run: make verify-package-augur

      - name: Run Hello Lattice integration suite (Phase 1 Gate 5)
        # Runs the six-milestone Hello Lattice vertical slice:
        # DDL definition, book creation, Lens projection, Postgres query,
        # AI agent cold-start traversal, and DDL rollback. Writes the gate5
        # Health KV marker.
        run: make test-hello-lattice
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Run Health KV completeness gate (Phase 1 Gate 5)
        # Connects to the live NATS + running Processor/Refractor and asserts
        # every non-event-driven Health KV key documented in
        # docs/observability/health-kv-schema.md appears within 30s.
        run: make test-health-completeness

      - name: Tear down
        if: always()
        run: make down

  convergence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run lease-convergence suite (Story 14.5 — external-I/O idempotency + convergence)
        # Boots Processor + Refractor + Loom + Weaver + the live bridge in-process
        # (embedded NATS, no extra Docker), installs the real package chain, and
        # drives a lease application to steady-state convergence through the live
        # bridge: drain-then-assert (AC #1), FR58 at-most-once end-to-end (AC #2),
        # D5 gate-asserted (AC #3), and the eager bgcheck-freshness @at lapse.
        # Compiled -tags leaseshortwindow so the freshness window is watchable.
        run: make test-lease-convergence

      - name: Run object-GC convergence e2e (Loop A+B)
        # Boots Processor + outbox + Refractor + Weaver + the object-store-manager
        # in-process; attach → detach → proves the objectLiveness lens →
        # directOp(TombstoneObject) → object.tombstoned → byte-reclaim chain.
        run: make test-object-gc

      - name: Run Augur convergence e2e (L3 escalation)
        # Boots Processor + outbox + Weaver + the live bridge (deterministic
        # FakeAugur, no real model call) in-process; drives an unplannable gap
        # through Weaver escalate → directOp(CreateAugurReasoningClaim) →
        # external.augur → bridge → RecordProposal. Proves a benign proposal lands
        # pending (billed once) AND a scope-escaping proposal is stored invalid
        # (the §5 validator DEFENDED assertion for the AI surface).
        run: make test-augur-convergence

      - name: Run unrouted-convergence gate (FR28/FR29 unroutedTasks Weaver target)
        # Boots Processor + Weaver in-process; installs rbac → identity →
        # orchestration-base via the real InstallPackage path and proves the
        # `surface` action round-trips: a violating row raises a named Health-KV
        # issue with no remediation dispatched, and the issue clears on close.
        run: make test-unrouted-convergence

      - name: Run crypto-shred gate (Vault crypto-shredding e2e)
        # Boots the real Processor commit path (Vault encrypt-on-write /
        # decrypt-on-read) plus a Refractor lens + the KeyShredded nullification
        # listener; drives CreateUnclaimedIdentity → ShredIdentityKey and proves
        # both the async privacy-worker and the Refractor listener handle it.
        run: make test-crypto-shred

      - name: Run system-actor-capability gate (Fire 2)
        # Boots the real Processor under LATTICE_AUTH_MODE=capability + the real
        # Refractor; submits the four system-actor-submitted engine ops (Weaver
        # MarkExpired, Loom CreateTask, object-store-manager DetachObject,
        # RecordShredFinalization) as the real kernel-seeded actors and proves
        # each authorizes.
        run: make test-system-actor-capability

      - name: Run control-plane-authz gate (FR30 Fire 1b Gate-3)
        # Boots the real Processor under LATTICE_AUTH_MODE=capability + the real
        # Refractor; drives a real weaver control.Service round-trip over NATS:
        # operator disable succeeds, intruder disable denied, anonymous disable
        # denied.
        run: make test-control-plane-authz

  # Shard package globs (also referenced verbatim by unit-shard-coverage below —
  # keep the two in sync; the coverage job fails CI if they ever drift).
  unit-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # A service Postgres (not the docker-compose stack) so internal/refractor/adapter's
    # RLS integration tests (skipIfNoPostgres) run here instead of silently skipping —
    # they used to run under the now-retired Gate 3 stack-gates step, the only place
    # POSTGRES_TEST_DSN was previously set.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lattice
          POSTGRES_PASSWORD: lattice_dev
          POSTGRES_DB: lattice
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lattice -d lattice"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run shard-1 tests (unit + integration)
        # -p 4: up to four test packages run concurrently. Every embedded
        # NATS+JetStream fixture binds a random port and owns a private
        # StoreDir under jsstore.Dir(t), so concurrent packages share no
        # JetStream file state — Postgres integration tests are the exception,
        # sharing the service container above (unique per-test table/role names
        # keep them -p-parallel-safe, per their own doc comments). This shard's
        # package list is weight-balanced against unit-2 by per-package
        # test-file line count (~53k LOC each half).
        env:
          POSTGRES_TEST_DSN: postgres://lattice:lattice_dev@localhost:5432/lattice?sslmode=disable
        run: >-
          go test -count=1 -p 4 -timeout 10m
          ./cmd/cafe-app/... ./cmd/clinic-app/... ./cmd/lattice/...
          ./internal/aiagent/... ./internal/bypass/... ./internal/chronicler/...
          ./internal/controlauth/... ./internal/natsperm/... ./internal/opstatus/...
          ./internal/pkgmgr/... ./internal/processor/... ./internal/starlarksandbox/...
          ./internal/substrate/... ./internal/testutil/... ./internal/vault/...
          ./packages/clinic-domain/... ./packages/control-authz/...
          ./packages/identity-domain/... ./packages/identity-hygiene/...
          ./packages/lease-signing/... ./packages/location-domain/...
          ./packages/loftspace-ledger/... ./packages/objects-base/...
          ./packages/one-bill/... ./packages/orchestration-base/...
          ./packages/privacy-operator-grant/... ./packages/service-domain/...
          ./packages/wellness-domain/...

  unit-2:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same Postgres rationale as unit-1 — RLS-dependent tests (cmd/loftspace-app,
    # internal/gateway, packages/clinic-reminders, internal/refractor's adapter +
    # ruleengine/full subtrees) landed in this shard too.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lattice
          POSTGRES_PASSWORD: lattice_dev
          POSTGRES_DB: lattice
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lattice -d lattice"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run shard-2 tests (unit + integration)
        env:
          POSTGRES_TEST_DSN: postgres://lattice:lattice_dev@localhost:5432/lattice?sslmode=disable
        run: >-
          go test -count=1 -p 4 -timeout 10m
          ./cmd/bootstrap/... ./cmd/bridge/... ./cmd/chronicler/... ./cmd/edge/...
          ./cmd/facet/... ./cmd/gateway/... ./cmd/lattice-pkg/... ./cmd/loftspace-app/...
          ./cmd/loom/... ./cmd/loupe/... ./cmd/object-store-manager/...
          ./cmd/processor/... ./cmd/refractor/... ./cmd/weaver/...
          ./cmd/wellness-app/... ./deploy/... ./examples/...
          ./internal/bootstrap/... ./internal/bridge/... ./internal/capabilitykv/...
          ./internal/edge/... ./internal/gateway/... ./internal/guardgrammar/...
          ./internal/healthkv/... ./internal/jsstore/... ./internal/loom/...
          ./internal/objectcrypto/... ./internal/objectmanager/...
          ./internal/privacyworker/... ./internal/refractor/... ./internal/spike/...
          ./internal/weaver/... ./packages/augur/... ./packages/cafe-domain/...
          ./packages/cafe-ledger/... ./packages/capability-author/...
          ./packages/clinic-ledger/... ./packages/clinic-reminders/...
          ./packages/console-operator/... ./packages/edge-manifest/... ./packages/front-desk/...
          ./packages/loftspace-domain/... ./packages/privacy-base/...
          ./packages/rbac-domain/... ./packages/semantic-contracts/...
          ./packages/service-location/... ./scripts/...

  edge-browser-store:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The browser Edge node's store is the one engine half that cannot be
    # proven by any other job here: bbolt's suite says nothing about
    # IndexedDB, and the js/wasm build check in lint-build only proves the
    # port compiles. This runs the SAME conformance suite against a real
    # IndexedDB in the runner image's headless Chrome, so a port that
    # compiles but breaks the last-writer-wins gate, FIFO order, or
    # durability across a reopen fails here rather than in a user's tab.
    # Its own job (not a shard) because it is the only one needing a browser.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Allow Chrome's sandbox to start
        # The runner image ships Chrome but, being Ubuntu 23.10+, restricts
        # unprivileged user namespaces via AppArmor — so Chrome finds "no usable
        # sandbox" and aborts before any test runs. Re-enable the namespace
        # rather than passing --no-sandbox: this job runs a real browser, and
        # keeping its sandbox costs one line. Guarded so it is a no-op on an
        # image without the knob rather than a failure.
        run: |
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Run the Edge IndexedDB store conformance suite
        run: make test-edge-idb-conformance

  unit-shard-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Assert unit-1 + unit-2 package globs union to exactly `go list ./...`
        # A fast (no Docker) guard against silent coverage loss: a package
        # added later that isn't sorted into either shard's glob list above
        # would otherwise never run in CI again.
        run: |
          go list ./... | sort -u > /tmp/all.txt
          go list \
            ./cmd/cafe-app/... ./cmd/clinic-app/... ./cmd/lattice/... \
            ./internal/aiagent/... ./internal/bypass/... ./internal/chronicler/... \
            ./internal/controlauth/... ./internal/natsperm/... ./internal/opstatus/... \
            ./internal/pkgmgr/... ./internal/processor/... ./internal/starlarksandbox/... \
            ./internal/substrate/... ./internal/testutil/... ./internal/vault/... \
            ./packages/clinic-domain/... ./packages/control-authz/... \
            ./packages/identity-domain/... ./packages/identity-hygiene/... \
            ./packages/lease-signing/... ./packages/location-domain/... \
            ./packages/loftspace-ledger/... ./packages/objects-base/... \
            ./packages/one-bill/... ./packages/orchestration-base/... \
            ./packages/privacy-operator-grant/... ./packages/service-domain/... \
            ./packages/wellness-domain/... \
            ./cmd/bootstrap/... ./cmd/bridge/... ./cmd/chronicler/... ./cmd/edge/... \
            ./cmd/facet/... ./cmd/gateway/... ./cmd/lattice-pkg/... ./cmd/loftspace-app/... \
            ./cmd/loom/... ./cmd/loupe/... ./cmd/object-store-manager/... \
            ./cmd/processor/... ./cmd/refractor/... ./cmd/weaver/... \
            ./cmd/wellness-app/... ./deploy/... ./examples/... \
            ./internal/bootstrap/... ./internal/bridge/... ./internal/capabilitykv/... \
            ./internal/edge/... ./internal/gateway/... ./internal/guardgrammar/... \
            ./internal/healthkv/... ./internal/jsstore/... ./internal/loom/... \
            ./internal/objectcrypto/... ./internal/objectmanager/... \
            ./internal/privacyworker/... ./internal/refractor/... ./internal/spike/... \
            ./internal/weaver/... ./packages/augur/... ./packages/cafe-domain/... \
            ./packages/cafe-ledger/... ./packages/capability-author/... \
            ./packages/clinic-ledger/... ./packages/clinic-reminders/... \
            ./packages/console-operator/... ./packages/edge-manifest/... ./packages/front-desk/... \
            ./packages/loftspace-domain/... ./packages/privacy-base/... \
            ./packages/rbac-domain/... ./packages/semantic-contracts/... \
            ./packages/service-location/... ./scripts/... \
            | sort -u > /tmp/sharded.txt
          diff /tmp/all.txt /tmp/sharded.txt && echo "OK: shards cover exactly go list ./..."
