name: wellness-domain
version: 0.10.0
description: |
  Wellness bookable domain: studio / session / booking / instructor vertex
  types + their aspects and links, written by Create*/Tombstone*/Cancel*/Bind*
  ops. CreateSession claims a deterministic studioSlotClaim per covered
  15-minute cell (double-session lock, mirrors clinic-domain's
  providerSlotClaim). CreateBooking claims the first free sessionSeatClaim
  within the session's capacity (SessionFull once exhausted — the same
  CreateOnly idiom extended over a seat-index dimension), rejects a booking on
  an already-started/ended session (SessionInPast, mirroring clinic's
  ScheduleInPast) and a booker's second live booking on the same session
  (DoubleBooked, a deterministic per-(session, booker) sessionBookerClaim guard
  mirroring cafe's cafeOpenTabGuard, released by CancelBooking so a re-book
  re-claims it) and, given an
  optional leaseAppKey, verifies residency via lease-signing's applicationFor
  link before granting the resident rate (a mismatch falls through to
  standard, never a hard failure). BindInstructorIdentity binds an instructor
  to a real login identity via the identity-domain `provider` archetype role
  (persona-worlds-design.md Fire W0), mirroring clinic-domain's
  BindProviderIdentity; a bound instructor's TombstoneSession grant is
  confined, in-script, to sessions they lead. Three projection lenses
  (wellnessStudios, wellnessSessions, wellnessBookings) are the P5 read models
  a wellness FE reads. No PHI/PII, no protected Postgres layer. Depends
  lease-signing (documentation only — CreateBooking reads its leaseapp by
  known key, no install-order requirement enforced at the Starlark level).
  CreateBooking, CancelBooking, and TombstoneSession each carry an op-meta
  with the edge-manifest descriptor vocabulary (presentation/inputSchema/
  dispatch, edge-showcase-app-design.md §3.3, Fire 5 adoption) — metadata
  only; a client still needs a service-catalog path (permitsOperation) to
  discover these ops.
depends:
  - lease-signing
declares:
  ddls:
    - canonicalName: studio
      class: meta.ddl.vertexType
    - canonicalName: session
      class: meta.ddl.vertexType
    - canonicalName: booking
      class: meta.ddl.vertexType
    - canonicalName: instructor
      class: meta.ddl.vertexType
    - canonicalName: studioProfile
      class: meta.ddl.aspectType
    - canonicalName: sessionSchedule
      class: meta.ddl.aspectType
    - canonicalName: studioSlotClaim
      class: meta.ddl.aspectType
    - canonicalName: sessionSeatClaim
      class: meta.ddl.aspectType
    - canonicalName: sessionBookerClaim
      class: meta.ddl.aspectType
    - canonicalName: bookingStatus
      class: meta.ddl.aspectType
    - canonicalName: instructorProfile
      class: meta.ddl.aspectType
    - canonicalName: instructorIdentityClaim
      class: meta.ddl.aspectType
    - canonicalName: identityInstructorClaim
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: wellnessStudios
      adapter: nats-kv
      bucket: wellness-studios
      engine: full
    - canonicalName: wellnessSessions
      adapter: nats-kv
      bucket: wellness-sessions
      engine: full
    - canonicalName: wellnessBookings
      adapter: nats-kv
      bucket: wellness-bookings
      engine: full
  permissions:
    - operationType: CreateStudio
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneStudio
      scope: any
      grantsTo: [operator]
    - operationType: CreateSession
      scope: any
      grantsTo: [operator, frontOfHouse]
    - operationType: TombstoneSession
      scope: any
      grantsTo: [operator, provider]
    - operationType: CreateBooking
      scope: any
      grantsTo: [operator]
    - operationType: CreateBooking
      scope: self
      grantsTo: [consumer]
    - operationType: CancelBooking
      scope: any
      grantsTo: [operator]
    - operationType: CancelBooking
      scope: self
      grantsTo: [consumer]
    - operationType: CreateInstructor
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneInstructor
      scope: any
      grantsTo: [operator]
    - operationType: BindInstructorIdentity
      scope: any
      grantsTo: [operator]
  opMetas:
    - operationType: CreateBooking
    - operationType: CancelBooking
    - operationType: TombstoneSession
