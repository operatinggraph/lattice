name: orchestration-base
version: 0.1.0
description: |
  Generic task substrate (task DDL + CreateTask op, assignee required and
  validated) plus the package-owned capabilityEphemeral lens that re-sources
  FR56 ephemeral task grants out of the bootstrap god-cypher into the
  disjoint key cap.ephemeral.<actor> (Contract #6 §6.6 / Contract #10 §10.7).
depends:
  - identity-domain
declares:
  ddls:
    - canonicalName: task
      class: meta.ddl.vertexType
    - canonicalName: loomLifecycle
      class: meta.ddl.vertexType
    - canonicalName: freshnessMarker
      class: meta.ddl.vertexType
    - canonicalName: freshnessExpiry
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: capabilityEphemeral
      adapter: nats-kv
      bucket: capability-kv
      engine: full
    - canonicalName: myTasks
      adapter: nats-kv
      bucket: my-tasks
      engine: full
  permissions:
    - operationType: CreateTask
      scope: any
      grantsTo: [operator]
    - operationType: ReAssignTask
      scope: any
      grantsTo: [operator]
    - operationType: CompleteTask
      scope: any
      grantsTo: [operator]
    - operationType: CancelTask
      scope: any
      grantsTo: [operator]
    - operationType: StartLoomPattern
      scope: any
      grantsTo: [operator]
    - operationType: CompletePattern
      scope: any
      grantsTo: [operator]
    - operationType: FailPattern
      scope: any
      grantsTo: [operator]
    - operationType: MarkExpired
      scope: any
      grantsTo: [operator]
