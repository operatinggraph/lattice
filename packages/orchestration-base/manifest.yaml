name: orchestration-base
version: 0.5.0
description: |
  Generic task substrate (task DDL + CreateTask/ClaimTask/SetAvailability,
  FR28 role-queue + fallback: assignee-or-queue routing gated on the
  assignee's availability aspect (Fire 2), ClaimTask role-holder claim) plus
  the package-owned capabilityEphemeral/myTasks lenses that re-source FR56
  ephemeral task grants + the task inbox out of the bootstrap god-cypher,
  including the FR28 role-queue fan-out (Contract #6 §6.6 / Contract #10
  §10.1 / §10.7), plus the FR29 unroutedTasks Weaver convergence target
  (surface-only — an unclaimed role-queued task past its own expiresAt rolls
  a Health-KV issue, no remediation dispatched), plus the Chronicler's
  loomFlowHistory event-sourced lens — a durable read model of every Loom
  flow's lifecycle (status/reason/timestamps), projected from
  `events.loom.>` into the orchestration-history bucket
  (orchestration-history-read-model-design.md Fire 2).
depends:
  - identity-domain
declares:
  ddls:
    - canonicalName: task
      class: meta.ddl.vertexType
    - canonicalName: loomLifecycle
      class: meta.ddl.vertexType
    - canonicalName: freshnessMarker
      class: meta.ddl.vertexType
    - canonicalName: freshnessExpiry
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: capabilityEphemeral
      adapter: nats-kv
      bucket: capability-kv
      engine: full
    - canonicalName: myTasks
      adapter: nats-kv
      bucket: my-tasks
      engine: full
    - canonicalName: unroutedTasks
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
    - canonicalName: loomFlowHistory
      adapter: nats-kv
      bucket: orchestration-history
  weaverTargets:
    - targetId: unroutedTasks
      lensRef: unroutedTasks
  permissions:
    - operationType: CreateTask
      scope: any
      grantsTo: [operator]
    - operationType: ClaimTask
      scope: any
      grantsTo: [operator]
    - operationType: ReAssignTask
      scope: any
      grantsTo: [operator]
    - operationType: CompleteTask
      scope: any
      grantsTo: [operator]
    - operationType: CancelTask
      scope: any
      grantsTo: [operator]
    - operationType: SetAvailability
      scope: any
      grantsTo: [operator]
    - operationType: StartLoomPattern
      scope: any
      grantsTo: [operator]
    - operationType: CompletePattern
      scope: any
      grantsTo: [operator]
    - operationType: FailPattern
      scope: any
      grantsTo: [operator]
    - operationType: MarkExpired
      scope: any
      grantsTo: [operator]
