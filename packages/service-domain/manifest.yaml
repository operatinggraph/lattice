name: service-domain
version: 0.5.0
description: |
  Service template + instance vertex type (the service DDL + lifecycle ops
  CreateServiceTemplate, CreateServiceInstance, RecordServiceOutcome,
  RequestService, RetireServiceTemplate). A service instance is a real linked
  vertex (instanceOf a template, providedTo an applicant identity) whose
  external-call outcome (status + completedAt) is recorded as aspects per D5
  — vertex root data minimal. The family enum is {backgroundCheck, payment,
  laundry, fitness, clinic} (edge-showcase-app-design.md §7.3, §7.4 — widened
  honestly for the showcase dataset). RequestService (edge-manifest Fire 1) is the
  consumer-invocable service-path counterpart to CreateServiceInstance:
  authorized structurally via authContext.service against the cap.svc
  availability grant, not a standing PermissionSpec — it carries no
  permission grant below. RetireServiceTemplate (§7.3) is admin-only cleanup
  that soft-deletes a live template that no longer belongs. Declares no lens
  (the serviceAccess / cap.svc read-path auth plane is Phase-3 deferred).
  Depends on identity-domain and orchestration-base.
depends:
  - identity-domain
  - orchestration-base
declares:
  ddls:
    - canonicalName: service
      class: meta.ddl.vertexType
  permissions:
    - operationType: CreateServiceTemplate
      scope: any
      grantsTo: [operator]
    - operationType: CreateServiceInstance
      scope: any
      grantsTo: [operator]
    - operationType: RecordServiceOutcome
      scope: any
      grantsTo: [operator]
    - operationType: RetireServiceTemplate
      scope: any
      grantsTo: [operator]
  opMetas:
    - operationType: CreateServiceInstance
    - operationType: RecordServiceOutcome
    - operationType: RequestService
