name: control-authz
version: 0.4.0
description: |
  Grants ctrl.<component>.<verb> control-plane permissions (Weaver/Loom/Refractor)
  to a new control-operator role, declared in the package definition and created
  in the single install batch (mirrors identity-domain's role-declaring pattern).
  Deliberately distinct from the kernel-primordial operator role so the
  control-operator identity stays an ordinary (non-system) rbac actor. Grant-only
  — the operator identity itself is provisioned by a one-time post-install op
  sequence, not by this package.
  control-plane-capability-authz-design.md §3.5 (FR30 Fire 1b).

  ctrl.refractor.{register,deregister,hydrate,sessionkey,syncgap} additionally
  grant scope=any to the consumer role (identity-domain) —
  per-identity-nats-subscribe-acl-design.md §3.3/§3.4 (Fire 2, ratified
  2026-07-10); edge-lattice-full-design.md §3.6 (EDGE.4, sessionkey);
  edge-syncgap-control-rpc-design.md (syncgap, warm-resume gap detection off
  the STREAM.INFO admin API). This is
  a broad grant (every claimed/unclaimed identity holds consumer) that is
  safe ONLY because internal/refractor/control/service.go's dispatchEndpoint
  unconditionally binds the op's body.IdentityID to the caller's own
  VERIFIED actor id for these ops (§3.4), rejecting a mismatching
  client-asserted value — the capability's scope=any never actually lets one
  identity act on another's Personal Lens interest set or read another
  identity's Vault session key; the effect is confined server-side
  regardless of what the capability grants. Granting this without that
  binding (or granting it without also opening the matching transport RPCs
  in internal/gateway/natsauth's controlRPCs) would reopen the original
  Fire 1 HIGH finding.
depends:
  - rbac-domain
  - identity-domain
declares:
  permissions:
    - operationType: ctrl.weaver.read
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.weaver.disable
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.weaver.enable
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.weaver.revoke
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.weaver.resetConfidence
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.loom.read
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.loom.pause
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.loom.resume
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.read
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.rebuild
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.pause
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.resume
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.delete
      scope: any
      grantsTo: [control-operator]
    - operationType: ctrl.refractor.register
      scope: any
      grantsTo: [control-operator, consumer, frontOfHouse]
    - operationType: ctrl.refractor.deregister
      scope: any
      grantsTo: [control-operator, consumer, frontOfHouse]
    - operationType: ctrl.refractor.hydrate
      scope: any
      grantsTo: [control-operator, consumer, frontOfHouse]
    - operationType: ctrl.refractor.sessionkey
      scope: any
      grantsTo: [control-operator, consumer, frontOfHouse]
    - operationType: ctrl.refractor.syncgap
      scope: any
      grantsTo: [control-operator, consumer, frontOfHouse]
