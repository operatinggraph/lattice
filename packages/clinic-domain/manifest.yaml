name: clinic-domain
version: 0.1.0
description: |
  Clinic bookable domain. Self-contained package owning three vertex types —
  patient, provider, appointment — with their aspects (.demographics, .profile,
  .schedule, .status, provider .bookings) and links (forPatient, withProvider),
  written by the Create*/Reschedule/SetAppointmentStatus/Tombstone* ops. Three
  projection lenses (clinicAppointments, clinicProviders, clinicPatients) are the
  P5 read models a clinic FE reads. CreateAppointment + RescheduleAppointment reject
  a double-book (SlotConflict) via the provider's OCC-snapshotted .bookings index,
  and an out-of-hours booking (OutsideHours) via the provider's opt-in .hours
  availability windows (SetProviderHours). No package dependency. PHI/Vault and
  @every recurring schedules are the separate deferred items this vertical forces —
  out of scope here.
declares:
  ddls:
    - canonicalName: patient
      class: meta.ddl.vertexType
    - canonicalName: provider
      class: meta.ddl.vertexType
    - canonicalName: appointment
      class: meta.ddl.vertexType
    - canonicalName: patientDemographics
      class: meta.ddl.aspectType
    - canonicalName: providerProfile
      class: meta.ddl.aspectType
    - canonicalName: appointmentSchedule
      class: meta.ddl.aspectType
    - canonicalName: appointmentStatus
      class: meta.ddl.aspectType
    - canonicalName: providerBookings
      class: meta.ddl.aspectType
    - canonicalName: providerHours
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: clinicAppointments
      adapter: nats-kv
      bucket: clinic-appointments
      engine: full
    - canonicalName: clinicProviders
      adapter: nats-kv
      bucket: clinic-providers
      engine: full
    - canonicalName: clinicPatients
      adapter: nats-kv
      bucket: clinic-patients
      engine: full
  permissions:
    - operationType: CreatePatient
      scope: any
      grantsTo: [operator]
    - operationType: TombstonePatient
      scope: any
      grantsTo: [operator]
    - operationType: CreateProvider
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneProvider
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderHours
      scope: any
      grantsTo: [operator]
    - operationType: CreateAppointment
      scope: any
      grantsTo: [operator]
    - operationType: RescheduleAppointment
      scope: any
      grantsTo: [operator]
    - operationType: SetAppointmentStatus
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneAppointment
      scope: any
      grantsTo: [operator]
