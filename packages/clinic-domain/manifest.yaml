name: clinic-domain
version: 0.10.0
description: |
  Clinic bookable domain. Self-contained package owning three vertex types —
  patient, provider, appointment — with their aspects (.demographics, .profile,
  .schedule, .status, .encounter, provider/patient .bookingGuard) and links
  (forPatient, withProvider, provider/patient-sourced hasBooking), written by the
  Create*/Reschedule/SetAppointmentStatus/RecordEncounter/Tombstone* ops.
  RecordEncounter captures the post-visit clinical record (.encounter — RAW PHI
  {summary, assessment, plan} never projected, plus operational documentation /
  follow-up signals the lens does project). Five projection lenses
  (clinicAppointments, clinicProviders, clinicPatients, clinicAppointmentsRead,
  providerAppointmentsRead) are the P5 read models a clinic FE reads.
  clinicAppointmentsRead and providerAppointmentsRead are the patient-self and
  provider-self PROTECTED Postgres read models (Contract #6 §6.14 RLS, D1.5,
  mirroring lease-signing's leaseApplicationsRead / landlordLeaseApplicationsRead)
  — cmd/clinic-app's My Appointments and My Schedule views read them as an
  authenticated actor instead of the unprotected clinicAppointments bucket; the
  clinic-wide staff audiences (follow-ups worklist, "All providers" aggregate)
  are not yet migrated (flagged follow-up, needs a staff/admin wildcard grant).
  CreateAppointment + RescheduleAppointment reject a provider double-book
  (SlotConflict) AND a patient double-book across providers (PatientDoubleBook)
  by ENUMERATING the provider's / patient's hasBooking links (kv.Links, Contract
  #2 §2.5.1) serialized on a scalar .bookingGuard epoch, and an out-of-hours
  booking (OutsideHours) via the provider's opt-in .hours availability windows
  (SetProviderHours). No package dependency. PHI/Vault and @every recurring
  schedules are the separate deferred items this vertical forces — out of scope here.
declares:
  ddls:
    - canonicalName: patient
      class: meta.ddl.vertexType
    - canonicalName: provider
      class: meta.ddl.vertexType
    - canonicalName: appointment
      class: meta.ddl.vertexType
    - canonicalName: patientDemographics
      class: meta.ddl.aspectType
    - canonicalName: providerProfile
      class: meta.ddl.aspectType
    - canonicalName: appointmentSchedule
      class: meta.ddl.aspectType
    - canonicalName: appointmentStatus
      class: meta.ddl.aspectType
    - canonicalName: providerBookingGuard
      class: meta.ddl.aspectType
    - canonicalName: providerHours
      class: meta.ddl.aspectType
    - canonicalName: providerTimeOff
      class: meta.ddl.aspectType
    - canonicalName: patientBookingGuard
      class: meta.ddl.aspectType
    - canonicalName: appointmentEncounter
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: clinicAppointments
      adapter: nats-kv
      bucket: clinic-appointments
      engine: full
    - canonicalName: clinicProviders
      adapter: nats-kv
      bucket: clinic-providers
      engine: full
    - canonicalName: clinicPatients
      adapter: nats-kv
      bucket: clinic-patients
      engine: full
    - canonicalName: clinicAppointmentsRead
      adapter: postgres
      engine: full
    - canonicalName: providerAppointmentsRead
      adapter: postgres
      engine: full
  permissions:
    - operationType: CreatePatient
      scope: any
      grantsTo: [operator]
    - operationType: TombstonePatient
      scope: any
      grantsTo: [operator]
    - operationType: CreateProvider
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneProvider
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderProfile
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderHours
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderTimeOff
      scope: any
      grantsTo: [operator]
    - operationType: CreateAppointment
      scope: any
      grantsTo: [operator]
    - operationType: RescheduleAppointment
      scope: any
      grantsTo: [operator]
    - operationType: SetAppointmentStatus
      scope: any
      grantsTo: [operator]
    - operationType: RecordEncounter
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneAppointment
      scope: any
      grantsTo: [operator]
