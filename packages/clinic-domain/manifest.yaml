name: clinic-domain
version: 0.26.2
depends:
  - location-domain
description: |
  Clinic bookable domain. Owns three vertex types —
  patient, provider, appointment — with their aspects (.demographics, .profile,
  .schedule, .status, .encounter, provider/patient .slot<cellcode> claims) and
  links (forPatient, withProvider, identifiedBy), written by the
  Create*/Reschedule/SetAppointmentStatus/RecordEncounter/Tombstone* ops.
  CreatePatient's optional identityKey wires identifiedBy to a pre-minted
  vtx.identity (identity-domain's CreateUnclaimedIdentity) carrying the
  patient's sensitive contact — .demographics itself stays non-sensitive
  (fullName only). A CreateOnly identityPatientClaim aspect on the identity
  (via the clinic-reminders idiom of a package attaching an aspect onto
  another package's vertex type) guards it globally: at most one patient may
  ever claim a given identity, so two DIFFERENT patients can never both wire
  the same identityKey. Display rides clinicPatientsRead's email/phone
  Secure-Lens columns (Vault Fire 5): decrypted at projection from the linked
  identity for the staff-wildcard audience, null for a patient with no
  identifiedBy link or a shredded identity.
  RecordEncounter captures the post-visit clinical record (.encounter — RAW PHI
  {summary, assessment, plan} never projected, plus operational documentation /
  follow-up signals the lens does project). Six projection lenses
  (clinicAppointments, clinicProviders, clinicPatients, clinicAppointmentsRead,
  providerAppointmentsRead, clinicPatientsRead) are the P5 read models a clinic FE
  reads. clinicAppointmentsRead, providerAppointmentsRead, and clinicPatientsRead
  are PROTECTED Postgres read models (Contract #6 §6.14 RLS, D1.5, mirroring
  lease-signing's leaseApplicationsRead / landlordLeaseApplicationsRead) —
  cmd/clinic-app's My Appointments, My Schedule, and the clinic-wide staff views
  (follow-ups worklist, "All providers" aggregate, the patient-context switcher
  roster) all read them as an authenticated actor instead of the unprotected
  NATS-KV buckets; the staff audiences use the reserved WildcardAnchor grant.
  clinicPatientReadGrants / clinicProviderReadGrants are the package's own
  cap-read.clinic.patient / cap-read.clinic.provider GrantTable producers
  (self-anchoring class=patient / class=provider onto their own bare NanoID,
  mirroring the platform's identity self-anchor): the platform base cap-read
  self-anchor only ever matches class=identity, so without these a patient's
  My Appointments / a provider's My Schedule were permanently empty (0-of-1
  read) — a JWT subject minted for a patient/provider's own NanoID had no
  grant to match its own anchor.
  The clinic's booking grid is a mandatory 15-minute cadence: CreateAppointment +
  RescheduleAppointment reject a provider double-book (SlotConflict) AND a
  patient double-book across providers (PatientDoubleBook) by CLAIMING a
  deterministic providerSlotClaim/patientSlotClaim aspect per covered 15-minute
  grid cell — the write-path key collision (CreateOnly/expectedRevision) IS the
  lock, no read-time enumeration — and an out-of-hours booking (OutsideHours) via
  the provider's opt-in .hours availability windows (SetProviderHours).
  @every recurring schedules are the separate deferred item
  this vertical forces — out of scope here. The Vault plane it forces is fully
  wired for contact (identifiedBy link + Secure-Lens display); the clinical
  record's (.encounter raw PHI) right-to-be-forgotten + display remain
  deferred.
  CreateAppointment ALSO grants consumer scope=self (real-actor-write-auth-e2e
  idiom, mirroring lease-signing's CreateLeaseApplication precedent): a real
  patient books their own appointment through the Gateway. Step 3 authorizes
  scope=self via authContext.target == actor (Contract #6); the script
  separately requires the target identity to be the named patient's linked
  identity (via identifiedBy), since the op's endpoint is the patient vertex,
  not an identity.
  CreateAppointment, RescheduleAppointment, and SetAppointmentStatus (cancel
  only) each carry an op-meta with the edge-manifest descriptor vocabulary
  (presentation/inputSchema/dispatch, edge-showcase-app-design.md §3.3, Fire
  5 adoption) — metadata only; a client still needs a service-catalog path
  (permitsOperation) to discover these ops, not yet wired.
  Multi-site (depends on location-domain): SetSiteProfile writes a `.site`
  aspect {name} onto a location-domain vtx.building (validated alive +
  class=location) — the clinicSite vertexType DDL / clinicSiteProfile
  aspectType DDL pair mirrors loftspace-domain's loftspaceListing aspect-
  contribution pattern. AssignProviderSite / RemoveProviderSite (the
  clinicSiteAssignment vertexType DDL) own the provider→building `practicesAt`
  LINK (lnk.provider.<id>.practicesAt.building.<id>, source=provider,
  target=building — the acting provider is the later-arriving source, mirroring
  loftspace-domain's loftspaceOwnership AssignUnitOwner exactly, including its
  create/revive-CAS/no-op idempotency). clinicSites projects one row per named
  site (building); providerSites projects one row per (provider, site) pair
  (mirrors identity-hygiene's duplicateCandidates: nats-kv, composite IntoKey,
  DiffRetraction) — the FE site directory + site-scoped booking are the next
  increment (clinic-multisite-design.md).
  BindProviderIdentity binds a provider to a login identity: it mints the provider's identifiedBy link, claims a
  CreateOnly guard aspect on EACH side (.identityClaim on the provider, .providerClaim on the identity) so the bind
  is mutually exclusive, and idempotently grants the identity-domain `provider` role via holdsRole. SetProviderHours,
  SetProviderTimeOff, SetAppointmentStatus, and RescheduleAppointment additionally grant `provider` scope=any: the
  script confines a bound, non-operator, non-workplace caller to the SPECIFIC provider it is identifiedBy-bound to
  (persona-worlds-design.md Fire W0). providerIdentityReadGrants and patientIdentityReadGrants are the
  cap-read.provider.clinic / cap-read.patient.clinic GrantTable producers (mirroring service-location's
  staffReadGrants shape) that let a signed-in login inherit the read anchors of the clinic entity it is bound to —
  a bound provider and an identifiedBy-bound patient respectively. They are what make a person's LOGIN the principal
  of their protected reads instead of the clinic entity standing in as its own actor; clinicPatientsRead's rows
  anchor per-patient to match, so the front desk reads the whole roster and a patient reads only their own record.
declares:
  ddls:
    - canonicalName: patient
      class: meta.ddl.vertexType
    - canonicalName: provider
      class: meta.ddl.vertexType
    - canonicalName: appointment
      class: meta.ddl.vertexType
    - canonicalName: clinicSite
      class: meta.ddl.vertexType
    - canonicalName: clinicSiteAssignment
      class: meta.ddl.vertexType
    - canonicalName: patientDemographics
      class: meta.ddl.aspectType
    - canonicalName: providerProfile
      class: meta.ddl.aspectType
    - canonicalName: appointmentSchedule
      class: meta.ddl.aspectType
    - canonicalName: appointmentStatus
      class: meta.ddl.aspectType
    - canonicalName: providerHours
      class: meta.ddl.aspectType
    - canonicalName: providerTimeOff
      class: meta.ddl.aspectType
    - canonicalName: providerSlotClaim
      class: meta.ddl.aspectType
    - canonicalName: patientSlotClaim
      class: meta.ddl.aspectType
    - canonicalName: appointmentEncounter
      class: meta.ddl.aspectType
    - canonicalName: identityPatientClaim
      class: meta.ddl.aspectType
    - canonicalName: clinicSiteProfile
      class: meta.ddl.aspectType
    - canonicalName: providerIdentityClaim
      class: meta.ddl.aspectType
    - canonicalName: identityProviderClaim
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: clinicAppointments
      adapter: nats-kv
      bucket: clinic-appointments
      engine: full
    - canonicalName: clinicProviders
      adapter: nats-kv
      bucket: clinic-providers
      engine: full
    - canonicalName: clinicPatients
      adapter: nats-kv
      bucket: clinic-patients
      engine: full
    - canonicalName: clinicSites
      adapter: nats-kv
      bucket: clinic-sites
      engine: full
    - canonicalName: providerSites
      adapter: nats-kv
      bucket: clinic-provider-sites
      engine: full
    - canonicalName: clinicAppointmentsRead
      adapter: postgres
      engine: full
    - canonicalName: providerAppointmentsRead
      adapter: postgres
      engine: full
    - canonicalName: clinicPatientsRead
      adapter: postgres
      engine: full
    - canonicalName: clinicPatientReadGrants
      adapter: postgres
      engine: full
    - canonicalName: clinicProviderReadGrants
      adapter: postgres
      engine: full
    - canonicalName: providerIdentityReadGrants
      adapter: postgres
      engine: full
    - canonicalName: patientIdentityReadGrants
      adapter: postgres
      engine: full
  permissions:
    - operationType: CreatePatient
      scope: any
      grantsTo: [operator, frontOfHouse]
    - operationType: TombstonePatient
      scope: any
      grantsTo: [operator]
    - operationType: CreateProvider
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneProvider
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderProfile
      scope: any
      grantsTo: [operator]
    - operationType: SetProviderHours
      scope: any
      grantsTo: [operator, provider]
    - operationType: SetProviderTimeOff
      scope: any
      grantsTo: [operator, provider]
    - operationType: CreateAppointment
      scope: any
      grantsTo: [operator, frontOfHouse]
    - operationType: CreateAppointment
      scope: self
      grantsTo: [consumer]
    - operationType: RescheduleAppointment
      scope: any
      grantsTo: [operator, frontOfHouse, provider]
    - operationType: RescheduleAppointment
      scope: self
      grantsTo: [consumer]
    - operationType: SetAppointmentStatus
      scope: any
      grantsTo: [operator, frontOfHouse, provider]
    - operationType: SetAppointmentStatus
      scope: self
      grantsTo: [consumer]
    - operationType: RecordEncounter
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneAppointment
      scope: any
      grantsTo: [operator]
    - operationType: SetSiteProfile
      scope: any
      grantsTo: [operator]
    - operationType: AssignProviderSite
      scope: any
      grantsTo: [operator]
    - operationType: RemoveProviderSite
      scope: any
      grantsTo: [operator]
    - operationType: BindProviderIdentity
      scope: any
      grantsTo: [operator]
  opMetas:
    - operationType: CreateAppointment
    - operationType: RescheduleAppointment
    - operationType: SetAppointmentStatus
    - operationType: SetProviderHours
    - operationType: SetProviderTimeOff
