name: bespoke-contracts
version: 0.4.0
description: |
  LoftSpace "Executable Paper" reference package (Fires V1-V4 — fixed/one-time,
  conditioned, judgment, recurring monthly, and prorated computational
  clauses, plus self-amendment): the clause vertex type (CreateClause/
  SupersedeClause, .prose/.terms/.status/.clauseInspection aspects, governs +
  chargesTo/requiresInspectionBy/conditionedOn/amends links) + the
  clauseSatisfaction actorAggregate convergence lens (§10.2, missing_charge/
  missing_inspection, freshUntil-armed recurring freshness) + the §10.8
  playbook dispatching directOp(DebitAccount)/assignTask(InspectPremises) on
  the gaps. Depends lease-signing + loftspace-ledger.
depends:
  - lease-signing
  - loftspace-ledger
declares:
  ddls:
    - canonicalName: clause
      class: meta.ddl.vertexType
    - canonicalName: clauseProse
      class: meta.ddl.aspectType
    - canonicalName: clauseTerms
      class: meta.ddl.aspectType
    - canonicalName: clauseStatus
      class: meta.ddl.aspectType
    - canonicalName: clauseInspection
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: clauseSatisfaction
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
  permissions:
    - operationType: CreateClause
      scope: any
      grantsTo: [operator]
    - operationType: InspectPremises
      scope: any
      grantsTo: [operator]
    - operationType: SupersedeClause
      scope: any
      grantsTo: [operator]
  weaverTargets:
    - targetId: clauseSatisfaction
      lensRef: clauseSatisfaction
  opMetas:
    - operationType: CreateClause
    - operationType: InspectPremises
    - operationType: SupersedeClause
