name: identity-domain
version: 0.3.0
description: |
  Identity vertex creation, claim, and state-machine management. Provides
  CreateUnclaimedIdentity, UpdateIdentityState, ClaimIdentity,
  RecordIdentityPII, ProvisionConsumerIdentity, InitiateCredentialLink,
  CompleteCredentialLink, UnlinkCredential. Depends on rbac-domain. The
  consumer, frontOfHouse, backOfHouse, and identityProvisioner roles are
  declared in the package definition and created in the single install
  batch routed through the Processor (Story 1.5.5).
depends:
  - rbac-domain
declares:
  ddls:
    - canonicalName: identity
      class: meta.ddl.vertexType
    - canonicalName: ssn
      class: meta.ddl.aspectType
    - canonicalName: dob
      class: meta.ddl.aspectType
    - canonicalName: name
      class: meta.ddl.aspectType
    - canonicalName: email
      class: meta.ddl.aspectType
    - canonicalName: phone
      class: meta.ddl.aspectType
    - canonicalName: claimKey
      class: meta.ddl.aspectType
    - canonicalName: linkKey
      class: meta.ddl.aspectType
    - canonicalName: credentialBinding
      class: meta.ddl.aspectType
    - canonicalName: idpBinding
      class: meta.ddl.aspectType
    - canonicalName: indexes
      class: meta.ddl.linkType
    - canonicalName: duplicateOf
      class: meta.ddl.linkType
    - canonicalName: actorRevocation
      class: meta.ddl.vertexType
    - canonicalName: gateway.actorRevoked
      class: meta.ddl.eventType
    - canonicalName: gateway.actorUnrevoked
      class: meta.ddl.eventType
  lenses:
    - canonicalName: identityIndexHint
      adapter: nats-kv
      bucket: identity-index-hint
      engine: full
  permissions:
    - operationType: CreateUnclaimedIdentity
      scope: any
      grantsTo: [frontOfHouse, backOfHouse, operator]
    - operationType: UpdateIdentityState
      scope: any
      grantsTo: [operator]
    - operationType: ClaimIdentity
      scope: self
      grantsTo: [consumer]
    - operationType: RecordIdentityPII
      scope: any
      grantsTo: [frontOfHouse, backOfHouse, operator]
    - operationType: ProvisionConsumerIdentity
      scope: any
      grantsTo: [identityProvisioner, operator]
    - operationType: InitiateCredentialLink
      scope: self
      grantsTo: [consumer]
    - operationType: CompleteCredentialLink
      scope: self
      grantsTo: [consumer]
    - operationType: UnlinkCredential
      scope: self
      grantsTo: [consumer]
    - operationType: RevokeActor
      scope: any
      grantsTo: [operator]
    - operationType: UnrevokeActor
      scope: any
      grantsTo: [operator]
