name: identity-domain
version: 0.1.0
description: |
  Identity vertex creation, claim, and state-machine management. Provides
  CreateUnclaimedIdentity, UpdateIdentityState, ClaimIdentity. Depends on
  rbac-domain. The PreInstall hook seeds the consumer, frontOfHouse, and
  backOfHouse roles before the main install batch runs.
depends:
  - rbac-domain
declares:
  ddls:
    - canonicalName: identity
      class: meta.ddl.vertexType
  permissions:
    - operationType: CreateUnclaimedIdentity
      scope: any
      grantsTo: [frontOfHouse, backOfHouse, operator]
    - operationType: UpdateIdentityState
      scope: any
      grantsTo: [operator]
    - operationType: ClaimIdentity
      scope: self
      grantsTo: [consumer]
