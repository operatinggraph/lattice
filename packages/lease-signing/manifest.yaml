name: lease-signing
version: 0.20.0
description: |
  Loftspace lease-application convergence vertical: the leaseapp vertex type
  (CreateLeaseApplication + SignLease), the leaseApplicationComplete
  actorAggregate convergence lens (§10.2 keyColumn), the leaseApplicationsRead
  protected Postgres read model (Contract #6 §6.14 RLS — the applicant-self
  read boundary, D1.3 Fire 2; carries the anchored executed-lease artifact's
  doc pointers) plus its landlordLeaseApplicationsRead sibling
  (the landlord/residence audience anchored on the managing landlord via the
  loftspace-domain manages link, D1.3 Increment 2), the §10.8 playbook
  (triggerLoom externalTask for bgcheck/payment/leaseDocument, assignTask
  SignLease, triggerLoom onboarding, directOp AttachObject anchoring the
  produced executed-lease artifact), the externalTask
  instanceOp/replyOp/dispatchOp wrapper DDLs (CreateLeaseServiceInstance /
  RecordLeaseServiceOutcome / RecordServiceDispatch, plus the leaseapp-subject
  docGen triad CreateLeaseDocInstance / RecordLeaseDocOutcome — the
  vendor-rendered executed-lease document), and the
  backgroundCheck/collectPayment/onboarding/leaseDocument loomPatterns. The
  external-call outcome lives in the .outcome aspect and a
  pending (async) call in the .dispatch aspect (D5); vertex roots stay minimal.
  Also the lease-renewal chain: a create-only .tenancy aspect stamped by
  DecideLeaseApplication's first approve, the renewal vertex type + its five
  ops (OpenRenewal / SetRenewalTerms / VerifyGuarantor / SignRenewal /
  CancelRenewal), the leaseExpiry frozen-table target, and the
  renewalComplete mode:planned target — the first goal-authored Weaver target
  (Contract #10 §10.8 Planner extension).
  Depends on identity-domain, service-domain, and orchestration-base.
depends:
  - identity-domain
  - service-domain
  - orchestration-base
declares:
  ddls:
    - canonicalName: leaseapp
      class: meta.ddl.vertexType
    - canonicalName: leaseServiceInstance
      class: meta.ddl.vertexType
    - canonicalName: leaseServiceReply
      class: meta.ddl.vertexType
    - canonicalName: leaseServiceDispatch
      class: meta.ddl.vertexType
    - canonicalName: leaseServiceOutcome
      class: meta.ddl.aspectType
    - canonicalName: leaseServiceDispatchMarker
      class: meta.ddl.aspectType
    - canonicalName: leaseDocInstance
      class: meta.ddl.vertexType
    - canonicalName: leaseDocReply
      class: meta.ddl.vertexType
    - canonicalName: leaseDocOutcome
      class: meta.ddl.aspectType
    - canonicalName: renewal
      class: meta.ddl.vertexType
  lenses:
    - canonicalName: leaseApplicationComplete
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
    - canonicalName: leaseApplicationsRead
      adapter: postgres
      engine: full
    - canonicalName: landlordLeaseApplicationsRead
      adapter: postgres
      engine: full
    - canonicalName: leaseExpiry
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
    - canonicalName: renewalComplete
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
    - canonicalName: renewalsRead
      adapter: postgres
      engine: full
  permissions:
    - operationType: CreateLeaseApplication
      scope: any
      grantsTo: [operator]
    - operationType: CreateLeaseApplication
      scope: self
      grantsTo: [consumer]
    - operationType: CreateLeaseServiceInstance
      scope: any
      grantsTo: [operator]
    - operationType: RecordLeaseServiceOutcome
      scope: any
      grantsTo: [operator]
    - operationType: RecordServiceDispatch
      scope: any
      grantsTo: [operator]
    - operationType: CreateLeaseDocInstance
      scope: any
      grantsTo: [operator]
    - operationType: RecordLeaseDocOutcome
      scope: any
      grantsTo: [operator]
    - operationType: SignLease
      scope: any
      grantsTo: [operator]
    - operationType: WithdrawLeaseApplication
      scope: any
      grantsTo: [operator]
    - operationType: DecideLeaseApplication
      scope: any
      grantsTo: [operator, frontOfHouse]
    - operationType: SetApplicantProfile
      scope: any
      grantsTo: [operator]
    - operationType: OpenRenewal
      scope: any
      grantsTo: [operator]
    - operationType: SetRenewalTerms
      scope: any
      grantsTo: [operator]
    - operationType: VerifyGuarantor
      scope: any
      grantsTo: [operator]
    - operationType: SignRenewal
      scope: any
      grantsTo: [operator]
    - operationType: CancelRenewal
      scope: any
      grantsTo: [operator]
  weaverTargets:
    - targetId: leaseApplicationComplete
      lensRef: leaseApplicationComplete
    - targetId: leaseExpiry
      lensRef: leaseExpiry
    - targetId: renewalComplete
      lensRef: renewalComplete
  loomPatterns:
    - patternId: backgroundCheck
      subjectType: identity
    - patternId: collectPayment
      subjectType: identity
    - patternId: onboarding
      subjectType: identity
    - patternId: leaseDocument
      subjectType: leaseapp
  opMetas:
    - operationType: DecideLeaseApplication
    - operationType: SignLease
    - operationType: RecordIdentityPII
    - operationType: CreateLeaseServiceInstance
    - operationType: RecordLeaseServiceOutcome
    - operationType: RecordServiceDispatch
    - operationType: CreateLeaseDocInstance
    - operationType: RecordLeaseDocOutcome
    - operationType: SetApplicantProfile
    - operationType: SetRenewalTerms
    - operationType: VerifyGuarantor
    - operationType: SignRenewal
