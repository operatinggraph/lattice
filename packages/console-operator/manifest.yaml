name: console-operator
version: 0.5.0
description: |
  Declares a scoped consoleOperator role and grants it the default-lane
  console ops (ShredIdentityKey, RevokeActor, UnrevokeActor, AttachObject,
  DetachObject) plus the ctrl.<component>.<verb> control-plane ops plus the
  allowlisted pkg-lifecycle trio (InstallPackage/UninstallPackage/
  UpgradePackage) at the meta lane — the Loupe operator's full console
  surface, including package lifecycle, without root. Deliberately distinct
  from the kernel-primordial operator role so a console operator stays an
  ordinary (non-system) rbac actor, no anchor, no boot-snapshot dependency;
  the pkg-lifecycle grant is honored only because the Processor's core
  privileged-lane allowlist covers {op, meta} for this trio (mechanism C).
  Also carries this role's read-side wildcard grant
  (consoleOperatorReadGrants), the capabilityReadWildcardGrants sibling for
  this package-installed role — M5's posture (wildcard grant through RLS,
  never a bypass) applied to consoleOperator the same way the kernel lens
  already applies it to root. loupe-operator-auth-lift-design.md mechanism B;
  scoped-privileged-lane-grants-design.md mechanism C.
depends:
  - rbac-domain
  - identity-domain
  - privacy-base
  - objects-base
declares:
  lenses:
    - canonicalName: consoleOperatorReadGrants
      adapter: postgres
      engine: full
  permissions:
    - operationType: ShredIdentityKey
      scope: any
      grantsTo: [consoleOperator]
    - operationType: RevokeActor
      scope: any
      grantsTo: [consoleOperator]
    - operationType: UnrevokeActor
      scope: any
      grantsTo: [consoleOperator]
    - operationType: AttachObject
      scope: any
      grantsTo: [consoleOperator]
    - operationType: DetachObject
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.weaver.read
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.weaver.disable
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.weaver.enable
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.weaver.revoke
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.weaver.resetConfidence
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.loom.read
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.loom.pause
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.loom.resume
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.read
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.rebuild
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.pause
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.resume
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.delete
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.register
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.deregister
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.hydrate
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.sessionkey
      scope: any
      grantsTo: [consoleOperator]
    - operationType: ctrl.refractor.syncgap
      scope: any
      grantsTo: [consoleOperator]
    - operationType: InstallPackage
      scope: any
      grantsTo: [consoleOperator]
    - operationType: UninstallPackage
      scope: any
      grantsTo: [consoleOperator]
    - operationType: UpgradePackage
      scope: any
      grantsTo: [consoleOperator]
