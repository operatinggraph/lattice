name: clinic-ledger
version: 0.1.0
description: |
  Clinic patient payment ledger: the clinicaccount vertex type (CreateAccount,
  one per patient, deterministic id) + the clinictransaction vertex type
  (DebitAccount / CreditAccount, append-only entries linked to the account via
  postedTo) + the clinicLedgerHistory read-model lens (one row per
  transaction). Depends clinic-domain.
depends:
  - clinic-domain
declares:
  ddls:
    - canonicalName: clinicaccount
      class: meta.ddl.vertexType
    - canonicalName: clinictransaction
      class: meta.ddl.vertexType
  lenses:
    - canonicalName: clinicLedgerHistory
      adapter: nats-kv
      bucket: clinic-ledger-history
      engine: full
  permissions:
    - operationType: CreateAccount
      scope: any
      grantsTo: [operator]
    - operationType: DebitAccount
      scope: any
      grantsTo: [operator]
    - operationType: CreditAccount
      scope: any
      grantsTo: [operator]
